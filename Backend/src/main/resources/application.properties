spring.application.name=project

server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/linkedin_posts
spring.datasource.username=root
spring.datasource.password=${DB_PW}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Gemini Integration
spring.ai.google.genai.api-key=${GEMINI_KEY}
spring.ai.google.genai.chat.options.model=gemini-3-flash-preview

# LinkedIn API
linkedin.client.id=${Client_Id}
linkedin.client.secret=${Client_Secret}
linkedin.access.token=${Access_token}
linkedin.person.urn=${URN}
